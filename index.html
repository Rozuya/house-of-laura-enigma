<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .wrapper { text-align: center; max-width: 600px; padding: 40px; border: 1px solid #222; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 5px; text-transform: uppercase; }
        .enigme-box { margin: 30px 0; font-style: italic; border-left: 2px solid var(--gold); padding-left: 15px; }
        input { background: transparent; border: 1px solid #444; color: white; padding: 12px; width: 70%; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; margin-top: 15px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--gold); color: black; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper" id="app">
    <h1>Accès Restreint</h1>
    <div class="enigme-box">
        <p>"Le silence est ma langue, l'ombre mon domaine.<br>Dévoile le mot qui brise mes chaînes."</p>
    </div>
    <input type="text" id="reponse" placeholder="Code d'accès">
    <br>
    <button onclick="verifier()">Déchiffrer</button>
    <div id="resultat" class="hidden">
        <p style="color: #4CAF50;">Accès autorisé.</p>
        <a href="URL_IMAGE" target="_blank" style="color: var(--gold);">Télécharger le document</a>
    </div>
</div>

<script>
    function verifier() {
        const input = document.getElementById('reponse').value.toLowerCase().trim();
        const app = document.getElementById('app');
        if (input === "TON_MOT_DE_PASSE") {
            document.getElementById('resultat').classList.remove('hidden');
        } else {
            app.classList.add('shake');
            setTimeout(() => app.classList.remove('shake'), 400);
        }
    }
</script>
</body>
</html>
