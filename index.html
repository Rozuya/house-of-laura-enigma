<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Laura | Archive Systémique</title>
    <style>
        /* [Tes styles restent identiques, je ne les recopie pas pour alléger] */
        :root { --neon-purple: #8a2be2; --bg-dark: #050505; --text-color: #e0e0e0; }
        body { background-color: var(--bg-dark); color: var(--text-color); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .audio-controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid var(--neon-purple); border-radius: 5px; color: var(--neon-purple); z-index: 100; width: 220px; }
    </style>
</head>
<body>

<div class="audio-controls">
    <button id="play-btn">SON : OFF</button>
    <label for="volume">VOLUME</label>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
</div>

<!-- On ajoute controls pour voir si le lecteur lui-même arrive à charger le fichier -->
<audio id="bg-music" loop>
    <source src="Arcania Protocol_Resonance.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('bg-music');
    const playBtn = document.getElementById('play-btn');
    const vol = document.getElementById('volume');

    playBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play().then(() => {
                playBtn.innerText = "SON : ON - Lecture";
            }).catch(err => {
                console.error("Erreur lecture:", err);
                alert("Erreur lecture : " + err);
            });
        } else {
            audio.pause();
            playBtn.innerText = "SON : OFF";
        }
    });

    vol.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });
</script>

</body>
</html>
